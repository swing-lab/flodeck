name: Create Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g., 0.1.0, 1.2.3)"
        required: true
        type: string
      publish:
        description: "Publish to PyPI after creating tag"
        required: false
        type: boolean
        default: true


jobs:
  tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([ab][0-9]+|rc[0-9]+)?$ ]]; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected: N.N.N with optional pre-release suffix (e.g., 0.1.0, 1.0.0a1, 2.0.0rc1)"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

  publish:
    needs: tag
    if: ${{ inputs.publish }}
    uses: ./.github/workflows/publish.yml
    with:
      ref: "v${{ inputs.version }}"
